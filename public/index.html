<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asistente financiero</title>
    <style>
      :root {
        --bg: #0f1419;
        --bg-mid: #121a24;
        --surface: #1a222c;
        --surface-2: #1e2835;
        --border: #2d3a47;
        --text: #e7ecf1;
        --muted: #8b9aab;
        --accent: #3d9cf5;
        --accent-dim: #2a6fa8;
        --accent-glow: rgba(61, 156, 245, 0.35);
        --user-bg: #243044;
        --err: #e07a5f;
        --ahorro-accent: #3d9a6e;
        --disponible-accent: #5b8fd9;
        --pendiente-accent: #d4a84b;
        --gasto-accent: #b85c5c;
        --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
        --radius: 14px;
        --font: system-ui, "Segoe UI", Roboto, sans-serif;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #e8ecf4;
          --bg-mid: #f0f3f9;
          --surface: #fff;
          --surface-2: #f7f9fc;
          --border: #d8dee6;
          --text: #1a222c;
          --muted: #5c6b7a;
          --user-bg: #e3eef9;
          --accent-glow: rgba(42, 111, 168, 0.2);
          --ahorro-accent: #2d7d4a;
          --disponible-accent: #2a6fa8;
          --pendiente-accent: #b8892a;
          --gasto-accent: #a84848;
          --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        background:
          radial-gradient(120% 80% at 100% 0%, rgba(61, 156, 245, 0.12) 0%, transparent 55%),
          radial-gradient(90% 60% at 0% 100%, rgba(61, 154, 110, 0.08) 0%, transparent 50%),
          linear-gradient(165deg, var(--bg) 0%, var(--bg-mid) 45%, var(--bg) 100%);
        color: var(--text);
      }

      .app {
        display: flex;
        max-width: 1280px;
        margin: 0 auto;
        min-height: 100dvh;
        height: 100dvh;
        width: 100%;
      }

      .panel--sidebar {
        width: 32%;
        min-width: 280px;
        max-width: 400px;
        padding: 0;
        border-right: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 100dvh;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface) 35%, var(--bg)) 0%,
          color-mix(in srgb, var(--surface) 18%, var(--bg)) 100%
        );
        box-shadow: inset -1px 0 0 color-mix(in srgb, var(--border) 40%, transparent);
      }

      .sidebar-intro {
        flex-shrink: 0;
        padding: 1.1rem 1rem 0.65rem 1.2rem;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface-2) 45%, transparent) 0%,
          transparent 100%
        );
        border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      }

      .panel--sidebar h2 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .panel--sidebar .sub {
        margin: 0;
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.4;
      }

      .sidebar-totales {
        margin-top: 0.65rem;
        padding-top: 0.6rem;
        border-top: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .sidebar-totales__row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.75rem;
        font-size: 0.78rem;
        line-height: 1.3;
      }

      .sidebar-totales__label {
        color: var(--muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 0.65rem;
      }

      .sidebar-totales__value {
        color: var(--text);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }

      #resumen-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
        padding: 0.75rem 1rem 1rem 1.2rem;
      }

      #resumen-list::-webkit-scrollbar {
        width: 6px;
      }

      #resumen-list::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--muted) 45%, transparent);
        border-radius: 999px;
      }

      .dash-section {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .dash-section__head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .dash-section__title {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .dash-section__total {
        margin: 0;
        font-size: 0.78rem;
        color: color-mix(in srgb, var(--text) 82%, var(--muted));
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .dash-section__subtitle {
        margin: 0 0 0.35rem;
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .dash-section__cards {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .fin-card {
        position: relative;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--surface) 92%, var(--surface-2)) 0%,
          color-mix(in srgb, var(--surface) 100%, #0000) 100%
        );
        border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
        border-radius: var(--radius);
        padding: 0.95rem 1rem;
        box-shadow: var(--card-shadow);
        overflow: hidden;
      }

      .fin-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.5;
        background: radial-gradient(
          120% 80% at 100% 0%,
          color-mix(in srgb, var(--accent) 12%, transparent) 0%,
          transparent 55%
        );
      }

      .fin-card--disponible {
        border-left-color: transparent;
      }

      .fin-card--disponible::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #7eb3f0 0%, var(--disponible-accent) 100%);
        border-radius: var(--radius) 0 0 var(--radius);
        pointer-events: none;
      }

      .fin-card--ahorro {
        border-left-color: transparent;
      }

      .fin-card--ahorro::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #6bc99a 0%, var(--ahorro-accent) 100%);
        border-radius: var(--radius) 0 0 var(--radius);
        pointer-events: none;
      }

      .fin-card--gasto {
        border-left-color: transparent;
      }

      .fin-card--gasto::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #d88a8a 0%, var(--gasto-accent) 100%);
        border-radius: var(--radius) 0 0 var(--radius);
        pointer-events: none;
      }

      .fin-card--pendiente {
        border-left-color: transparent;
      }

      .fin-card--pendiente::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #e8c066 0%, var(--pendiente-accent) 100%);
        border-radius: var(--radius) 0 0 var(--radius);
        pointer-events: none;
      }

      .fin-card > * {
        position: relative;
        z-index: 1;
      }

      .fin-card__nombre {
        font-size: 0.8rem;
        font-weight: 600;
        margin: 0 0 0.2rem;
        line-height: 1.25;
        color: var(--text);
      }

      .fin-card__meta {
        font-size: 0.72rem;
        color: var(--muted);
        margin: 0 0 0.45rem;
        line-height: 1.3;
      }

      .fin-card__monto {
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .fin-card__fecha {
        font-size: 0.65rem;
        color: var(--muted);
        margin: 0.35rem 0 0;
      }

      .empty-state {
        padding: 1rem 0.5rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.45;
      }

      .empty-state strong {
        display: block;
        color: var(--text);
        margin-bottom: 0.35rem;
        font-size: 0.9rem;
      }

      #resumen-status {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }

      #resumen-status.error {
        color: var(--err);
      }

      .panel--chat {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--surface) 12%, transparent) 0%,
          transparent 42%
        );
      }

      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1rem 1.25rem 0 1rem;
        min-height: 0;
      }

      header {
        flex-shrink: 0;
        padding: 0.5rem 0 1rem;
        border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface-2) 25%, transparent) 0%,
          transparent 100%
        );
      }

      header h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      #log {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        min-height: 12rem;
      }

      .msg {
        max-width: 92%;
        padding: 0.65rem 0.85rem;
        border-radius: var(--radius);
        line-height: 1.45;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        align-self: flex-end;
        background: linear-gradient(145deg, var(--user-bg) 0%, color-mix(in srgb, var(--accent) 12%, var(--user-bg)) 100%);
        border: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      }

      .msg.assistant {
        align-self: flex-start;
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--surface) 95%, var(--surface-2)) 0%,
          color-mix(in srgb, var(--surface) 100%, transparent) 100%
        );
        border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      }

      .msg.assistant.warn {
        border-color: var(--err);
        color: var(--text);
      }

      .msg.system {
        align-self: center;
        font-size: 0.8rem;
        color: var(--muted);
        background: transparent;
        border: none;
        padding: 0.25rem;
      }

      .msg.assistant.typing {
        color: var(--muted);
        font-style: italic;
        border-style: dashed;
      }

      .composer {
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
        padding: 1rem 0 max(1rem, env(safe-area-inset-bottom));
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--bg) 96%, var(--surface)) 0%,
          color-mix(in srgb, var(--bg) 55%, transparent) 55%,
          transparent 100%
        );
      }

      .row {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 2.75rem;
        max-height: 8rem;
        padding: 0.65rem 0.75rem;
        border-radius: var(--radius);
        border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface) 100%, var(--surface-2)) 0%,
          var(--surface) 100%
        );
        color: var(--text);
        font: inherit;
        line-height: 1.4;
        box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 6%, transparent);
      }

      textarea:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      textarea:disabled {
        opacity: 0.6;
      }

      button[type="submit"] {
        padding: 0.65rem 1rem;
        border-radius: var(--radius);
        border: none;
        background: linear-gradient(160deg, #5aadff 0%, var(--accent) 45%, var(--accent-dim) 100%);
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 4px 14px var(--accent-glow);
      }

      button[type="submit"]:hover:not(:disabled) {
        background: linear-gradient(160deg, #6bb8ff 0%, var(--accent-dim) 100%);
        box-shadow: 0 6px 18px var(--accent-glow);
      }

      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 768px) {
        .app {
          flex-direction: column;
        }

        .panel--sidebar {
          width: 100%;
          max-width: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: min(42vh, 100dvh);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel panel--sidebar" aria-label="Resumen financiero por secciones">
        <div class="sidebar-intro">
          <h2>Tu dinero</h2>
          <p class="sub">Saldos y listas vienen del servidor; los totales de abajo son esos mismos datos.</p>
          <div id="resumen-totales" class="sidebar-totales" aria-label="Totales de disponible y ahorro"></div>
          <div id="resumen-status" aria-live="polite"></div>
        </div>
        <div id="resumen-list"></div>
      </aside>
      <main class="panel panel--chat">
        <div class="shell">
          <header>
            <h1>Asistente financiero</h1>
          </header>
          <div id="log" role="log" aria-live="polite" aria-relevant="additions"></div>
          <form class="composer" id="form" autocomplete="off">
            <div class="row">
              <label class="visually-hidden" for="input">Mensaje</label>
              <textarea
                id="input"
                name="message"
                rows="1"
                placeholder="Ej. gasté 15000 en transporte"
                required
                aria-label="Mensaje para el asistente"
              ></textarea>
              <button type="submit" id="send">Enviar</button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script>
      (function () {
        const logEl = document.getElementById("log");
        const form = document.getElementById("form");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("send");
        const resumenList = document.getElementById("resumen-list");
        const resumenTotales = document.getElementById("resumen-totales");
        const resumenStatus = document.getElementById("resumen-status");

        function formatMonto(n, moneda) {
          const x = Math.round(Number(n));
          if (!Number.isFinite(x)) return String(n);
          const m = (moneda || "CLP").trim().toUpperCase();
          if (m === "CLP") {
            return "$" + x.toLocaleString("es-CL", { maximumFractionDigits: 0 });
          }
          return x.toLocaleString("es-CL", { maximumFractionDigits: 0 }) + " " + m;
        }

        function formatFechaCorta(iso) {
          if (!iso || typeof iso !== "string") return "";
          try {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return "";
            return d.toLocaleDateString("es-CL", { day: "numeric", month: "short" });
          } catch {
            return "";
          }
        }

        function elFinCard(nombre, bancoLine, montoStr, variant, fechaStr) {
          const card = document.createElement("article");
          card.className = "fin-card fin-card--" + variant;
          const tit = document.createElement("h3");
          tit.className = "fin-card__nombre";
          tit.textContent = nombre || "—";
          card.appendChild(tit);
          if (bancoLine) {
            const meta = document.createElement("p");
            meta.className = "fin-card__meta";
            meta.textContent = bancoLine;
            card.appendChild(meta);
          }
          const mon = document.createElement("p");
          mon.className = "fin-card__monto";
          mon.textContent = montoStr;
          card.appendChild(mon);
          if (fechaStr) {
            const fe = document.createElement("p");
            fe.className = "fin-card__fecha";
            fe.textContent = fechaStr;
            card.appendChild(fe);
          }
          return card;
        }

        function filaTotalIntro(label, montoFormateado) {
          const row = document.createElement("div");
          row.className = "sidebar-totales__row";
          const lab = document.createElement("span");
          lab.className = "sidebar-totales__label";
          lab.textContent = label;
          const val = document.createElement("span");
          val.className = "sidebar-totales__value";
          val.textContent = montoFormateado;
          row.appendChild(lab);
          row.appendChild(val);
          return row;
        }

        function pintarTotalesIntro(data, moneda) {
          if (!resumenTotales) return;
          resumenTotales.replaceChildren();
          const ahr =
            data.saldo_ahorrado_total != null && typeof data.saldo_ahorrado_total === "number"
              ? data.saldo_ahorrado_total
              : 0;
          const pend =
            data.dinero_pendiente_repartir != null && typeof data.dinero_pendiente_repartir === "number"
              ? data.dinero_pendiente_repartir
              : 0;
          resumenTotales.appendChild(
            filaTotalIntro("Disponible", formatMonto(data.saldo_disponible, moneda)),
          );
          if (pend > 0) {
            resumenTotales.appendChild(
              filaTotalIntro("Pendiente de repartir", formatMonto(pend, moneda)),
            );
          }
          resumenTotales.appendChild(filaTotalIntro("Ahorro", formatMonto(ahr, moneda)));
        }

        function seccionDashboard(titulo, totalStr) {
          const sec = document.createElement("section");
          sec.className = "dash-section";
          const head = document.createElement("div");
          head.className = "dash-section__head";
          const h = document.createElement("h3");
          h.className = "dash-section__title";
          h.textContent = titulo;
          head.appendChild(h);
          if (totalStr) {
            const t = document.createElement("p");
            t.className = "dash-section__total";
            t.textContent = totalStr;
            head.appendChild(t);
          }
          sec.appendChild(head);
          const cards = document.createElement("div");
          cards.className = "dash-section__cards";
          sec.appendChild(cards);
          return { sec, cards };
        }

        async function refreshResumen() {
          resumenStatus.textContent = "Actualizando…";
          resumenStatus.classList.remove("error");
          try {
            const res = await fetch("/api/resumen-cuentas");
            const ct = res.headers.get("content-type") || "";
            const data = ct.includes("application/json") ? await res.json() : null;
            if (!res.ok) {
              throw new Error((data && data.error) || "Error " + res.status);
            }
            if (!data || typeof data.saldo_disponible !== "number") {
              throw new Error("Respuesta inválida");
            }

            resumenList.replaceChildren();
            resumenStatus.textContent = "";

            const moneda = data.moneda || "CLP";
            pintarTotalesIntro(data, moneda);
            const disp = Array.isArray(data.seccion_disponible) ? data.seccion_disponible : [];
            const ahr = Array.isArray(data.seccion_ahorro) ? data.seccion_ahorro : [];
            const gUlt = Array.isArray(data.gastos_ultimos) ? data.gastos_ultimos : [];
            const gCat = Array.isArray(data.gastos_por_categoria) ? data.gastos_por_categoria : [];
            const pend =
              data.dinero_pendiente_repartir != null && typeof data.dinero_pendiente_repartir === "number"
                ? data.dinero_pendiente_repartir
                : 0;

            const sPend = seccionDashboard(
              "Pendiente de repartir",
              pend > 0 ? formatMonto(pend, moneda) : "",
            );
            resumenList.appendChild(sPend.sec);
            if (pend > 0) {
              sPend.cards.appendChild(
                elFinCard(
                  "Por asignar a una cuenta",
                  "Ingresos sin cuenta o saldo aún no repartido",
                  formatMonto(pend, moneda),
                  "pendiente",
                  "",
                ),
              );
            } else {
              const emptyP = document.createElement("div");
              emptyP.className = "empty-state";
              emptyP.textContent =
                "No hay dinero pendiente: todo el disponible está en cuentas o el saldo es cero.";
              sPend.cards.appendChild(emptyP);
            }

            const s1 = seccionDashboard(
              "Dinero disponible",
              "Total " + formatMonto(data.saldo_disponible, moneda),
            );
            resumenList.appendChild(s1.sec);
            if (disp.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.textContent =
                pend > 0
                  ? "Aún no hay cuentas con saldo. Usa el chat para asignar desde «disponible sin cuenta» (ej. a Cuenta RUT o Mercado Pago)."
                  : "Sin cuentas disponibles con saldo en la base de datos.";
              s1.cards.appendChild(empty);
            } else {
              for (const c of disp) {
                if (!c) continue;
                const banco = c.banco && String(c.banco).trim() ? String(c.banco).trim() : null;
                s1.cards.appendChild(
                  elFinCard(String(c.nombre || "—"), banco, formatMonto(c.monto, moneda), "disponible", ""),
                );
              }
            }

            const s2 = seccionDashboard(
              "Ahorro",
              "Total " + formatMonto(data.saldo_ahorrado_total, moneda),
            );
            resumenList.appendChild(s2.sec);
            if (ahr.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.textContent = "Sin ahorros registrados en cuentas.";
              s2.cards.appendChild(empty);
            } else {
              for (const c of ahr) {
                if (!c) continue;
                const banco = c.banco && String(c.banco).trim() ? String(c.banco).trim() : null;
                s2.cards.appendChild(
                  elFinCard(String(c.nombre || "—"), banco, formatMonto(c.monto, moneda), "ahorro", ""),
                );
              }
            }

            let sumaUltimos = 0;
            for (const g of gUlt) {
              if (!g) continue;
              const v = Math.round(Number(g.monto));
              if (Number.isFinite(v) && v > 0) sumaUltimos += v;
            }
            let sumaCategorias = 0;
            for (const row of gCat) {
              if (!row) continue;
              const v = Math.round(Number(row.monto));
              if (Number.isFinite(v) && v > 0) sumaCategorias += v;
            }
            const partesGastos = [];
            if (sumaUltimos > 0) partesGastos.push("Últimos " + formatMonto(sumaUltimos, moneda));
            if (sumaCategorias > 0) partesGastos.push("Por categoría " + formatMonto(sumaCategorias, moneda));
            const totalGastosStr = partesGastos.length > 0 ? partesGastos.join(" · ") : "";

            const s3 = seccionDashboard("Gastos", totalGastosStr);
            resumenList.appendChild(s3.sec);
            const subUlt = document.createElement("h4");
            subUlt.className = "dash-section__subtitle";
            subUlt.textContent = "Últimos gastos";
            s3.cards.appendChild(subUlt);
            if (gUlt.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.style.padding = "0.5rem 0";
              empty.textContent = "Aún no hay gastos recientes.";
              s3.cards.appendChild(empty);
            } else {
              for (const g of gUlt) {
                if (!g) continue;
                const fe = formatFechaCorta(g.fecha);
                s3.cards.appendChild(
                  elFinCard(
                    String(g.etiqueta || "Gasto"),
                    null,
                    formatMonto(g.monto, moneda),
                    "gasto",
                    fe,
                  ),
                );
              }
            }
            const subCat = document.createElement("h4");
            subCat.className = "dash-section__subtitle";
            subCat.style.marginTop = "0.65rem";
            subCat.textContent = "Por categoría";
            s3.cards.appendChild(subCat);
            if (gCat.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.style.padding = "0.5rem 0";
              empty.textContent = "Sin datos por categoría.";
              s3.cards.appendChild(empty);
            } else {
              for (const row of gCat) {
                if (!row) continue;
                s3.cards.appendChild(
                  elFinCard(
                    String(row.categoria || "—"),
                    null,
                    formatMonto(row.monto, moneda),
                    "gasto",
                    "",
                  ),
                );
              }
            }
          } catch (err) {
            if (resumenTotales) resumenTotales.replaceChildren();
            resumenStatus.textContent =
              err instanceof Error ? err.message : String(err);
            resumenStatus.classList.add("error");
          }
        }

        function scrollToBottom() {
          logEl.scrollTop = logEl.scrollHeight;
        }

        function appendBubble(role, text, opts) {
          const div = document.createElement("div");
          div.className = "msg " + role + (opts && opts.warn ? " warn" : "");
          div.textContent = text;
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
        }

        function appendSystem(text) {
          const div = document.createElement("div");
          div.className = "msg system";
          div.textContent = text;
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
        }

        function showTyping() {
          const div = document.createElement("div");
          div.className = "msg assistant typing";
          div.setAttribute("aria-busy", "true");
          div.textContent = "Escribiendo…";
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
          return div;
        }

        function removeTyping(el) {
          if (el && el.parentNode === logEl) {
            logEl.removeChild(el);
          }
        }

        async function sendMessage(text) {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const ct = res.headers.get("content-type") || "";
          let body;
          try {
            body = ct.includes("application/json") ? await res.json() : { raw: await res.text() };
          } catch {
            throw new Error("Respuesta no legible del servidor.");
          }

          if (!res.ok) {
            const err =
              body && typeof body.error === "string"
                ? body.error
                : "Error HTTP " + res.status;
            throw new Error(err);
          }

          if (!body || typeof body.texto !== "string") {
            throw new Error("Formato de respuesta inesperado.");
          }

          return body;
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const text = input.value.trim();
          if (!text) return;

          appendBubble("user", text);
          input.value = "";
          input.style.height = "auto";

          sendBtn.disabled = true;
          input.disabled = true;

          const typingEl = showTyping();

          try {
            const data = await sendMessage(text);
            removeTyping(typingEl);
            appendBubble("assistant", data.texto, { warn: !data.resultado || !data.resultado.ok });
            void refreshResumen();
          } catch (err) {
            removeTyping(typingEl);
            appendBubble(
              "assistant",
              err instanceof Error ? err.message : String(err),
              { warn: true },
            );
          } finally {
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            requestAnimationFrame(scrollToBottom);
          }
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
          }
        });

        input.addEventListener("input", function () {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 128) + "px";
        });

        appendSystem("Listo. Escribe un mensaje y pulsa Enviar.");
        input.focus();
        void refreshResumen();
      })();
    </script>
  </body>
</html>
