<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asistente financiero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #030306;
        --bg-mid: #0a0b12;
        --surface: rgba(14, 16, 28, 0.72);
        --surface-2: rgba(22, 26, 44, 0.85);
        --border: rgba(255, 255, 255, 0.07);
        --text: #eef2f7;
        --muted: #8b95a8;
        --accent: #2ee6ff;
        --accent-dim: #00a8c4;
        --accent-glow: rgba(46, 230, 255, 0.35);
        --accent-violet: #a78bfa;
        --user-bg: rgba(46, 230, 255, 0.09);
        --err: #ff6b8a;
        --neon-disponible: #2ee6ff;
        --neon-ahorro: #5ef7b2;
        --neon-gasto: #ff7b9c;
        --neon-pendiente: #ffd85c;
        --radius: 16px;
        --font: "Outfit", system-ui, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, monospace;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6fb;
          --bg-mid: #e8ecf6;
          --surface: rgba(255, 255, 255, 0.82);
          --surface-2: rgba(248, 250, 255, 0.95);
          --border: rgba(15, 23, 42, 0.1);
          --text: #0f172a;
          --muted: #64748b;
          --accent: #0891b2;
          --accent-dim: #0e7490;
          --accent-glow: rgba(8, 145, 178, 0.22);
          --user-bg: rgba(8, 145, 178, 0.1);
          --neon-disponible: #0891b2;
          --neon-ahorro: #059669;
          --neon-gasto: #e11d48;
          --neon-pendiente: #d97706;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        background:
          radial-gradient(ellipse 100% 80% at 85% -10%, rgba(46, 230, 255, 0.14) 0%, transparent 50%),
          radial-gradient(ellipse 80% 60% at -5% 90%, rgba(167, 139, 250, 0.12) 0%, transparent 48%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(94, 247, 178, 0.06) 0%, transparent 45%),
          linear-gradient(168deg, var(--bg) 0%, var(--bg-mid) 42%, #04050c 100%);
        color: var(--text);
      }

      @media (prefers-color-scheme: light) {
        body {
          background:
            radial-gradient(ellipse 90% 70% at 90% 0%, rgba(8, 145, 178, 0.08) 0%, transparent 50%),
            radial-gradient(ellipse 70% 50% at 0% 100%, rgba(99, 102, 241, 0.06) 0%, transparent 45%),
            linear-gradient(168deg, var(--bg) 0%, var(--bg-mid) 100%);
        }
      }

      .app {
        display: flex;
        max-width: 1280px;
        margin: 0 auto;
        min-height: 100dvh;
        height: 100dvh;
        width: 100%;
      }

      .panel--sidebar {
        width: 32%;
        min-width: 280px;
        max-width: 400px;
        padding: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 100dvh;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface) 55%, transparent) 0%,
          color-mix(in srgb, var(--surface) 25%, transparent) 100%
        );
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: inset -1px 0 0 var(--border);
      }

      .sidebar-intro {
        flex-shrink: 0;
        padding: 1.1rem 1rem 0.65rem 1.2rem;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface-2) 50%, transparent) 0%,
          transparent 100%
        );
        border-bottom: 1px solid var(--border);
      }

      .panel--sidebar h2 {
        margin: 0;
        font-size: 1.08rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(105deg, var(--text) 0%, color-mix(in srgb, var(--accent) 55%, var(--text)) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      @media (prefers-color-scheme: light) {
        .panel--sidebar h2 {
          background: none;
          -webkit-background-clip: unset;
          background-clip: unset;
          color: var(--text);
        }
      }

      .panel--sidebar .sub {
        margin: 0;
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.4;
      }

      .sidebar-totales {
        margin-top: 0.65rem;
        padding-top: 0.6rem;
        border-top: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .sidebar-totales__row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.75rem;
        font-size: 0.78rem;
        line-height: 1.3;
      }

      .sidebar-totales__label {
        color: var(--muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 0.65rem;
      }

      .sidebar-totales__value {
        color: var(--text);
        font-weight: 600;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
        font-size: 0.82rem;
      }

      #resumen-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
        padding: 0.75rem 1rem 1rem 1.2rem;
      }

      #resumen-list::-webkit-scrollbar {
        width: 6px;
      }

      #resumen-list::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--accent) 35%, var(--muted));
        border-radius: 999px;
      }

      .dash-section {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .dash-section__head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .dash-section__title {
        margin: 0;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: color-mix(in srgb, var(--muted) 92%, var(--accent));
      }

      .dash-section__total {
        margin: 0;
        font-size: 0.75rem;
        color: color-mix(in srgb, var(--text) 88%, var(--accent));
        font-weight: 600;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
      }

      .dash-section__subtitle {
        margin: 0 0 0.35rem;
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .dash-section__cards {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .fin-card {
        position: relative;
        border-radius: var(--radius);
        padding: 1rem 1.05rem 1.08rem;
        overflow: hidden;
        border: 1px solid var(--border);
        background: linear-gradient(
          155deg,
          color-mix(in srgb, var(--surface-2) 88%, transparent) 0%,
          color-mix(in srgb, #05060c 94%, transparent) 100%
        );
        box-shadow:
          0 4px 28px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      }

      @media (prefers-color-scheme: light) {
        .fin-card {
          background: linear-gradient(
            155deg,
            color-mix(in srgb, #fff 92%, transparent) 0%,
            color-mix(in srgb, var(--surface-2) 96%, #fff) 100%
          );
          box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
      }

      .fin-card:hover {
        transform: translateY(-2px);
      }

      .fin-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.35;
        background: radial-gradient(
          100% 120% at 100% -20%,
          var(--card-tint, rgba(46, 230, 255, 0.12)) 0%,
          transparent 55%
        );
      }

      .fin-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 8%;
        right: 8%;
        height: 2px;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--card-line, var(--neon-disponible)) 20%,
          var(--card-line, var(--neon-disponible)) 80%,
          transparent 100%
        );
        box-shadow: 0 0 14px var(--card-glow, rgba(46, 230, 255, 0.45));
        pointer-events: none;
        z-index: 2;
      }

      .fin-card--disponible {
        --card-tint: rgba(46, 230, 255, 0.14);
        --card-line: var(--neon-disponible);
        --card-glow: rgba(46, 230, 255, 0.35);
        border-color: color-mix(in srgb, var(--neon-disponible) 22%, var(--border));
        box-shadow:
          0 4px 28px rgba(0, 0, 0, 0.4),
          0 0 36px -10px color-mix(in srgb, var(--neon-disponible) 40%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .fin-card--ahorro {
        --card-tint: rgba(94, 247, 178, 0.12);
        --card-line: var(--neon-ahorro);
        --card-glow: rgba(94, 247, 178, 0.35);
        border-color: color-mix(in srgb, var(--neon-ahorro) 22%, var(--border));
        box-shadow:
          0 4px 28px rgba(0, 0, 0, 0.4),
          0 0 36px -10px color-mix(in srgb, var(--neon-ahorro) 38%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .fin-card--gasto {
        --card-tint: rgba(255, 123, 156, 0.12);
        --card-line: var(--neon-gasto);
        --card-glow: rgba(255, 123, 156, 0.32);
        border-color: color-mix(in srgb, var(--neon-gasto) 22%, var(--border));
        box-shadow:
          0 4px 28px rgba(0, 0, 0, 0.4),
          0 0 36px -10px color-mix(in srgb, var(--neon-gasto) 35%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .fin-card--pendiente {
        --card-tint: rgba(255, 216, 92, 0.1);
        --card-line: var(--neon-pendiente);
        --card-glow: rgba(255, 216, 92, 0.38);
        border-color: color-mix(in srgb, var(--neon-pendiente) 24%, var(--border));
        box-shadow:
          0 4px 28px rgba(0, 0, 0, 0.4),
          0 0 36px -10px color-mix(in srgb, var(--neon-pendiente) 42%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .fin-card > * {
        position: relative;
        z-index: 1;
      }

      .fin-card__nombre {
        font-size: 0.78rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
        padding-top: 0.15rem;
        line-height: 1.3;
        color: color-mix(in srgb, var(--text) 94%, var(--muted));
        letter-spacing: 0.02em;
      }

      .fin-card__meta {
        font-size: 0.7rem;
        color: var(--muted);
        margin: 0 0 0.5rem;
        line-height: 1.35;
        font-weight: 500;
      }

      .fin-card__monto {
        font-family: var(--font-mono);
        font-size: 1.22rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.04em;
        color: var(--text);
        text-shadow: 0 0 28px color-mix(in srgb, var(--card-line, var(--accent)) 25%, transparent);
      }

      @media (prefers-color-scheme: light) {
        .fin-card__monto {
          text-shadow: none;
        }
      }

      .fin-card__fecha {
        font-size: 0.65rem;
        color: var(--muted);
        margin: 0.35rem 0 0;
      }

      .empty-state {
        padding: 1rem 0.5rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.45;
      }

      .empty-state strong {
        display: block;
        color: var(--text);
        margin-bottom: 0.35rem;
        font-size: 0.9rem;
      }

      #resumen-status {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }

      #resumen-status.error {
        color: var(--err);
      }

      .panel--chat {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: linear-gradient(
          160deg,
          color-mix(in srgb, var(--surface) 18%, transparent) 0%,
          transparent 55%
        );
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1rem 1.25rem 0 1rem;
        min-height: 0;
      }

      header {
        flex-shrink: 0;
        padding: 0.5rem 0 1rem;
        border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface-2) 25%, transparent) 0%,
          transparent 100%
        );
      }

      header h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      @media (prefers-color-scheme: dark) {
        header h1 {
          background: linear-gradient(100deg, var(--text) 0%, color-mix(in srgb, var(--accent) 40%, var(--text)) 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
      }

      #log {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        min-height: 12rem;
      }

      .msg {
        max-width: 92%;
        padding: 0.65rem 0.85rem;
        border-radius: var(--radius);
        line-height: 1.45;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        align-self: flex-end;
        border-radius: var(--radius);
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--accent) 14%, rgba(8, 12, 24, 0.92)) 0%,
          rgba(6, 10, 22, 0.88) 100%
        );
        border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border));
        box-shadow:
          0 4px 20px rgba(0, 0, 0, 0.25),
          0 0 24px -8px color-mix(in srgb, var(--accent) 35%, transparent);
      }

      .msg.assistant {
        align-self: flex-start;
        border-radius: var(--radius);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--surface-2) 75%, transparent) 0%,
          color-mix(in srgb, #06080f 90%, transparent) 100%
        );
        border: 1px solid var(--border);
        box-shadow: 0 4px 22px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      @media (prefers-color-scheme: light) {
        .msg.user {
          background: linear-gradient(135deg, rgba(8, 145, 178, 0.12) 0%, rgba(255, 255, 255, 0.95) 100%);
          border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
          box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
        }

        .msg.assistant {
          background: linear-gradient(145deg, #fff 0%, var(--surface-2) 100%);
          box-shadow: 0 4px 18px rgba(15, 23, 42, 0.05);
          backdrop-filter: none;
        }
      }

      .msg.assistant.warn {
        border-color: var(--err);
        color: var(--text);
      }

      .msg.system {
        align-self: center;
        font-size: 0.8rem;
        color: var(--muted);
        background: transparent;
        border: none;
        padding: 0.25rem;
      }

      .msg.assistant.typing {
        color: var(--muted);
        font-style: italic;
        border-style: dashed;
      }

      .composer {
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
        padding: 1rem 0 max(1rem, env(safe-area-inset-bottom));
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--bg) 96%, var(--surface)) 0%,
          color-mix(in srgb, var(--bg) 55%, transparent) 55%,
          transparent 100%
        );
      }

      .row {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 2.75rem;
        max-height: 8rem;
        padding: 0.7rem 0.85rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: color-mix(in srgb, #06080f 88%, transparent);
        color: var(--text);
        font: inherit;
        line-height: 1.45;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 0 20px -12px color-mix(in srgb, var(--accent) 25%, transparent);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      @media (prefers-color-scheme: light) {
        textarea {
          background: #fff;
          box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
        }
      }

      textarea:focus {
        outline: none;
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        box-shadow:
          inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent),
          0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent),
          0 0 28px -10px color-mix(in srgb, var(--accent) 40%, transparent);
      }

      textarea:disabled {
        opacity: 0.6;
      }

      button[type="submit"] {
        padding: 0.7rem 1.15rem;
        border-radius: var(--radius);
        border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent);
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--accent) 92%, #fff) 0%,
          var(--accent-dim) 48%,
          color-mix(in srgb, var(--accent-violet) 35%, var(--accent-dim)) 100%
        );
        color: #020308;
        font-weight: 700;
        font-size: 0.88rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
        box-shadow:
          0 4px 20px color-mix(in srgb, var(--accent) 35%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
        transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      }

      button[type="submit"]:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.06);
        box-shadow:
          0 8px 28px color-mix(in srgb, var(--accent) 45%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        .fin-card,
        button[type="submit"] {
          transition: none;
        }

        .fin-card:hover,
        button[type="submit"]:hover:not(:disabled) {
          transform: none;
        }
      }

      @media (max-width: 768px) {
        .app {
          flex-direction: column;
        }

        .panel--sidebar {
          width: 100%;
          max-width: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: min(42vh, 100dvh);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel panel--sidebar" aria-label="Resumen financiero por secciones">
        <div class="sidebar-intro">
          <h2>Tu dinero</h2>
          <p class="sub">Saldos y listas vienen del servidor; los totales de abajo son esos mismos datos.</p>
          <div id="resumen-totales" class="sidebar-totales" aria-label="Totales de disponible y ahorro"></div>
          <div id="resumen-status" aria-live="polite"></div>
        </div>
        <div id="resumen-list"></div>
      </aside>
      <main class="panel panel--chat">
        <div class="shell">
          <header>
            <h1>Asistente financiero</h1>
          </header>
          <div id="log" role="log" aria-live="polite" aria-relevant="additions"></div>
          <form class="composer" id="form" autocomplete="off">
            <div class="row">
              <label class="visually-hidden" for="input">Mensaje</label>
              <textarea
                id="input"
                name="message"
                rows="1"
                placeholder="Ej. gasté 15000 en transporte"
                required
                aria-label="Mensaje para el asistente"
              ></textarea>
              <button type="submit" id="send">Enviar</button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script>
      (function () {
        const logEl = document.getElementById("log");
        const form = document.getElementById("form");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("send");
        const resumenList = document.getElementById("resumen-list");
        const resumenTotales = document.getElementById("resumen-totales");
        const resumenStatus = document.getElementById("resumen-status");

        function formatMonto(n, moneda) {
          const x = Math.round(Number(n));
          if (!Number.isFinite(x)) return String(n);
          const m = (moneda || "CLP").trim().toUpperCase();
          if (m === "CLP") {
            return "$" + x.toLocaleString("es-CL", { maximumFractionDigits: 0 });
          }
          return x.toLocaleString("es-CL", { maximumFractionDigits: 0 }) + " " + m;
        }

        function formatFechaCorta(iso) {
          if (!iso || typeof iso !== "string") return "";
          try {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return "";
            return d.toLocaleDateString("es-CL", { day: "numeric", month: "short" });
          } catch {
            return "";
          }
        }

        function elFinCard(nombre, bancoLine, montoStr, variant, fechaStr) {
          const card = document.createElement("article");
          card.className = "fin-card fin-card--" + variant;
          const tit = document.createElement("h3");
          tit.className = "fin-card__nombre";
          tit.textContent = nombre || "—";
          card.appendChild(tit);
          if (bancoLine) {
            const meta = document.createElement("p");
            meta.className = "fin-card__meta";
            meta.textContent = bancoLine;
            card.appendChild(meta);
          }
          const mon = document.createElement("p");
          mon.className = "fin-card__monto";
          mon.textContent = montoStr;
          card.appendChild(mon);
          if (fechaStr) {
            const fe = document.createElement("p");
            fe.className = "fin-card__fecha";
            fe.textContent = fechaStr;
            card.appendChild(fe);
          }
          return card;
        }

        function filaTotalIntro(label, montoFormateado) {
          const row = document.createElement("div");
          row.className = "sidebar-totales__row";
          const lab = document.createElement("span");
          lab.className = "sidebar-totales__label";
          lab.textContent = label;
          const val = document.createElement("span");
          val.className = "sidebar-totales__value";
          val.textContent = montoFormateado;
          row.appendChild(lab);
          row.appendChild(val);
          return row;
        }

        function pintarTotalesIntro(data, moneda) {
          if (!resumenTotales) return;
          resumenTotales.replaceChildren();
          const ahr =
            data.saldo_ahorrado_total != null && typeof data.saldo_ahorrado_total === "number"
              ? data.saldo_ahorrado_total
              : 0;
          const pend =
            data.dinero_pendiente_repartir != null && typeof data.dinero_pendiente_repartir === "number"
              ? data.dinero_pendiente_repartir
              : 0;
          resumenTotales.appendChild(
            filaTotalIntro("Disponible", formatMonto(data.saldo_disponible, moneda)),
          );
          if (pend > 0) {
            resumenTotales.appendChild(
              filaTotalIntro("Pendiente de repartir", formatMonto(pend, moneda)),
            );
          }
          resumenTotales.appendChild(filaTotalIntro("Ahorro", formatMonto(ahr, moneda)));
        }

        function seccionDashboard(titulo, totalStr) {
          const sec = document.createElement("section");
          sec.className = "dash-section";
          const head = document.createElement("div");
          head.className = "dash-section__head";
          const h = document.createElement("h3");
          h.className = "dash-section__title";
          h.textContent = titulo;
          head.appendChild(h);
          if (totalStr) {
            const t = document.createElement("p");
            t.className = "dash-section__total";
            t.textContent = totalStr;
            head.appendChild(t);
          }
          sec.appendChild(head);
          const cards = document.createElement("div");
          cards.className = "dash-section__cards";
          sec.appendChild(cards);
          return { sec, cards };
        }

        async function refreshResumen() {
          resumenStatus.textContent = "Actualizando…";
          resumenStatus.classList.remove("error");
          try {
            const res = await fetch("/api/resumen-cuentas", { cache: "no-store" });
            const ct = res.headers.get("content-type") || "";
            const data = ct.includes("application/json") ? await res.json() : null;
            if (!res.ok) {
              throw new Error((data && data.error) || "Error " + res.status);
            }
            if (!data || typeof data.saldo_disponible !== "number") {
              throw new Error("Respuesta inválida");
            }

            resumenList.replaceChildren();
            resumenStatus.textContent = "";

            const moneda = data.moneda || "CLP";
            pintarTotalesIntro(data, moneda);
            const disp = Array.isArray(data.seccion_disponible) ? data.seccion_disponible : [];
            const ahr = Array.isArray(data.seccion_ahorro) ? data.seccion_ahorro : [];
            const gUlt = Array.isArray(data.gastos_ultimos) ? data.gastos_ultimos : [];
            const gCat = Array.isArray(data.gastos_por_categoria) ? data.gastos_por_categoria : [];
            const pend =
              data.dinero_pendiente_repartir != null && typeof data.dinero_pendiente_repartir === "number"
                ? data.dinero_pendiente_repartir
                : 0;

            const sPend = seccionDashboard(
              "Pendiente de repartir",
              pend > 0 ? formatMonto(pend, moneda) : "",
            );
            resumenList.appendChild(sPend.sec);
            if (pend > 0) {
              sPend.cards.appendChild(
                elFinCard(
                  "Por asignar a una cuenta",
                  "Ingresos sin cuenta o saldo aún no repartido",
                  formatMonto(pend, moneda),
                  "pendiente",
                  "",
                ),
              );
            } else {
              const emptyP = document.createElement("div");
              emptyP.className = "empty-state";
              emptyP.textContent =
                "No hay dinero pendiente: todo el disponible está en cuentas o el saldo es cero.";
              sPend.cards.appendChild(emptyP);
            }

            const s1 = seccionDashboard(
              "Dinero disponible",
              "Total " + formatMonto(data.saldo_disponible, moneda),
            );
            resumenList.appendChild(s1.sec);
            if (disp.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.textContent =
                pend > 0
                  ? "Aún no hay cuentas con saldo. Usa el chat para asignar desde «disponible sin cuenta» (ej. a Cuenta RUT o Mercado Pago)."
                  : "Sin cuentas disponibles con saldo en la base de datos.";
              s1.cards.appendChild(empty);
            } else {
              for (const c of disp) {
                if (!c) continue;
                const banco = c.banco && String(c.banco).trim() ? String(c.banco).trim() : null;
                s1.cards.appendChild(
                  elFinCard(String(c.nombre || "—"), banco, formatMonto(c.monto, moneda), "disponible", ""),
                );
              }
            }

            const s2 = seccionDashboard(
              "Ahorro",
              "Total " + formatMonto(data.saldo_ahorrado_total, moneda),
            );
            resumenList.appendChild(s2.sec);
            if (ahr.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.textContent = "Sin ahorros registrados en cuentas.";
              s2.cards.appendChild(empty);
            } else {
              for (const c of ahr) {
                if (!c) continue;
                const banco = c.banco && String(c.banco).trim() ? String(c.banco).trim() : null;
                s2.cards.appendChild(
                  elFinCard(String(c.nombre || "—"), banco, formatMonto(c.monto, moneda), "ahorro", ""),
                );
              }
            }

            let sumaUltimos = 0;
            for (const g of gUlt) {
              if (!g) continue;
              const v = Math.round(Number(g.monto));
              if (Number.isFinite(v) && v > 0) sumaUltimos += v;
            }
            let sumaCategorias = 0;
            for (const row of gCat) {
              if (!row) continue;
              const v = Math.round(Number(row.monto));
              if (Number.isFinite(v) && v > 0) sumaCategorias += v;
            }
            const partesGastos = [];
            if (sumaUltimos > 0) partesGastos.push("Últimos " + formatMonto(sumaUltimos, moneda));
            if (sumaCategorias > 0) partesGastos.push("Por categoría " + formatMonto(sumaCategorias, moneda));
            const totalGastosStr = partesGastos.length > 0 ? partesGastos.join(" · ") : "";

            const s3 = seccionDashboard("Gastos", totalGastosStr);
            resumenList.appendChild(s3.sec);
            const subUlt = document.createElement("h4");
            subUlt.className = "dash-section__subtitle";
            subUlt.textContent = "Últimos gastos";
            s3.cards.appendChild(subUlt);
            if (gUlt.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.style.padding = "0.5rem 0";
              empty.textContent = "Aún no hay gastos recientes.";
              s3.cards.appendChild(empty);
            } else {
              for (const g of gUlt) {
                if (!g) continue;
                const fe = formatFechaCorta(g.fecha);
                s3.cards.appendChild(
                  elFinCard(
                    String(g.etiqueta || "Gasto"),
                    null,
                    formatMonto(g.monto, moneda),
                    "gasto",
                    fe,
                  ),
                );
              }
            }
            const subCat = document.createElement("h4");
            subCat.className = "dash-section__subtitle";
            subCat.style.marginTop = "0.65rem";
            subCat.textContent = "Por categoría";
            s3.cards.appendChild(subCat);
            if (gCat.length === 0) {
              const empty = document.createElement("div");
              empty.className = "empty-state";
              empty.style.padding = "0.5rem 0";
              empty.textContent = "Sin datos por categoría.";
              s3.cards.appendChild(empty);
            } else {
              for (const row of gCat) {
                if (!row) continue;
                s3.cards.appendChild(
                  elFinCard(
                    String(row.categoria || "—"),
                    null,
                    formatMonto(row.monto, moneda),
                    "gasto",
                    "",
                  ),
                );
              }
            }
          } catch (err) {
            if (resumenTotales) resumenTotales.replaceChildren();
            resumenStatus.textContent =
              err instanceof Error ? err.message : String(err);
            resumenStatus.classList.add("error");
          }
        }

        function scrollToBottom() {
          logEl.scrollTop = logEl.scrollHeight;
        }

        function appendBubble(role, text, opts) {
          const div = document.createElement("div");
          div.className = "msg " + role + (opts && opts.warn ? " warn" : "");
          div.textContent = text;
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
        }

        function appendSystem(text) {
          const div = document.createElement("div");
          div.className = "msg system";
          div.textContent = text;
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
        }

        function showTyping() {
          const div = document.createElement("div");
          div.className = "msg assistant typing";
          div.setAttribute("aria-busy", "true");
          div.textContent = "Escribiendo…";
          logEl.appendChild(div);
          requestAnimationFrame(scrollToBottom);
          return div;
        }

        function removeTyping(el) {
          if (el && el.parentNode === logEl) {
            logEl.removeChild(el);
          }
        }

        async function sendMessage(text) {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const ct = res.headers.get("content-type") || "";
          let body;
          try {
            body = ct.includes("application/json") ? await res.json() : { raw: await res.text() };
          } catch {
            throw new Error("Respuesta no legible del servidor.");
          }

          if (!res.ok) {
            const err =
              body && typeof body.error === "string"
                ? body.error
                : "Error HTTP " + res.status;
            throw new Error(err);
          }

          if (!body || typeof body.texto !== "string") {
            throw new Error("Formato de respuesta inesperado.");
          }

          return body;
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const text = input.value.trim();
          if (!text) return;

          appendBubble("user", text);
          input.value = "";
          input.style.height = "auto";

          sendBtn.disabled = true;
          input.disabled = true;

          const typingEl = showTyping();

          try {
            const data = await sendMessage(text);
            removeTyping(typingEl);
            appendBubble("assistant", data.texto, { warn: !data.resultado || !data.resultado.ok });
            void refreshResumen();
          } catch (err) {
            removeTyping(typingEl);
            appendBubble(
              "assistant",
              err instanceof Error ? err.message : String(err),
              { warn: true },
            );
          } finally {
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            requestAnimationFrame(scrollToBottom);
          }
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
          }
        });

        input.addEventListener("input", function () {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 128) + "px";
        });

        appendSystem("Listo. Escribe un mensaje y pulsa Enviar.");
        input.focus();
        void refreshResumen();
      })();
    </script>
  </body>
</html>
